# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deployment pipeline: triggered on merge to main after tests pass.
#
# Steps:
#   1. Authenticate to AWS via OIDC (no stored secrets)
#   2. Upload model artifacts to S3
#   3. Package SageMaker inference bundle (model.tar.gz)
#   4. Update the SageMaker endpoint to the new model version
#   5. Run a smoke test against the live endpoint
#
# Required GitHub Secrets:
#   AWS_CICD_ROLE_ARN   — from: terraform output cicd_deploy_role_arn
#   ARTIFACTS_BUCKET    — from: terraform output artifacts_bucket_name
#
# IAM role trust policy allows:
#   token.actions.githubusercontent.com:sub =
#     repo:jfarrell8/superconductivity_predictor:ref:refs/heads/main
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual triggers from the GitHub UI

env:
  AWS_REGION:  us-east-1
  SM_ENDPOINT: sc-predictor-dev-endpoint    # matches Terraform endpoint name
  SM_MODEL:    sc-predictor-dev-predictor   # matches Terraform model name

jobs:
  # ── Job 1: Run tests first (gates deployment) ─────────────────────────────
  test:
    name: Test gate
    uses: ./.github/workflows/test.yml

  # ── Job 2: Package + upload model artifacts to S3 ─────────────────────────
  upload-artifacts:
    name: Upload Model Artifacts to S3
    runs-on: ubuntu-latest
    needs: [test]

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check for model artifacts
        id: check-artifacts
        run: |
          if [ -f "models/best_model_top15.pkl" ] && [ -f "models/top_features.json" ]; then
            echo "artifacts_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifacts_exist=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No model artifacts found in repo. Skipping artifact upload."
          fi

      - name: Package SageMaker inference bundle
        if: steps.check-artifacts.outputs.artifacts_exist == 'true'
        run: |
          mkdir -p /tmp/sm_model
          cp models/best_model_top15.pkl /tmp/sm_model/
          cp models/top_features.json /tmp/sm_model/
          cp src/api/sagemaker/inference.py /tmp/sm_model/
          tar -czf models/best_model_top15.tar.gz -C /tmp/sm_model .
          echo "Packaged model bundle:"
          ls -lh models/best_model_top15.tar.gz

      - name: Upload artifacts to S3
        if: steps.check-artifacts.outputs.artifacts_exist == 'true'
        run: |
          aws s3 cp models/best_model_top15.tar.gz \
            s3://${{ secrets.ARTIFACTS_BUCKET }}/models/best_model_top15.tar.gz

          aws s3 cp models/top_features.json \
            s3://${{ secrets.ARTIFACTS_BUCKET }}/models/top_features.json

          # Upload optional metadata files if present
          for f in model_metadata.json feature_medians.json data_manifest.json; do
            if [ -f "models/$f" ]; then
              aws s3 cp "models/$f" \
                "s3://${{ secrets.ARTIFACTS_BUCKET }}/models/$f"
              echo "Uploaded models/$f"
            fi
          done

          echo "All artifacts uploaded to s3://${{ secrets.ARTIFACTS_BUCKET }}/models/"

  # ── Job 3: Update SageMaker endpoint ──────────────────────────────────────
  update-endpoint:
    name: Update SageMaker Endpoint
    runs-on: ubuntu-latest
    needs: [upload-artifacts]

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check endpoint exists
        id: check-endpoint
        run: |
          if aws sagemaker describe-endpoint \
              --endpoint-name "$SM_ENDPOINT" \
              --region "$AWS_REGION" 2>/dev/null; then
            echo "endpoint_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "endpoint_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Endpoint $SM_ENDPOINT does not exist. Skipping update."
          fi

      - name: Create new SageMaker endpoint config
        if: steps.check-endpoint.outputs.endpoint_exists == 'true'
        id: new-config
        run: |
          CONFIG_NAME="${SM_ENDPOINT}-config-${{ github.sha }}"

          aws sagemaker create-endpoint-config \
            --endpoint-config-name "$CONFIG_NAME" \
            --region "$AWS_REGION" \
            --production-variants \
              "VariantName=primary,\
              ModelName=$SM_MODEL,\
              InitialInstanceCount=1,\
              InstanceType=ml.t2.medium,\
              InitialVariantWeight=1.0"

          echo "config_name=$CONFIG_NAME" >> "$GITHUB_OUTPUT"
          echo "Created endpoint config: $CONFIG_NAME"

      - name: Update endpoint (zero-downtime)
        if: steps.check-endpoint.outputs.endpoint_exists == 'true'
        run: |
          aws sagemaker update-endpoint \
            --endpoint-name "$SM_ENDPOINT" \
            --endpoint-config-name "${{ steps.new-config.outputs.config_name }}" \
            --region "$AWS_REGION"

          echo "Waiting for endpoint to reach InService state..."
          aws sagemaker wait endpoint-in-service \
            --endpoint-name "$SM_ENDPOINT" \
            --region "$AWS_REGION"
          echo "Endpoint updated successfully."

      - name: Smoke test live endpoint
        if: steps.check-endpoint.outputs.endpoint_exists == 'true'
        run: |
          # Build payload dynamically from committed top_features.json
          FEATURES=$(python3 -c "
          import json
          features = json.load(open('models/top_features.json'))
          payload = {'features': {f: float(i+1) for i, f in enumerate(features)}}
          print(json.dumps(payload))
          ")

          echo "Smoke test payload: $FEATURES"

          RESPONSE=$(aws sagemaker-runtime invoke-endpoint \
            --endpoint-name "$SM_ENDPOINT" \
            --content-type "application/json" \
            --body "$FEATURES" \
            --region "$AWS_REGION" \
            /dev/stdout 2>&1)

          echo "Smoke test response: $RESPONSE"

          # Fail if response does not contain predictions
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert 'predictions' in data, f'Expected predictions key, got: {data}'
          assert len(data['predictions']) > 0, 'Empty predictions list'
          print(f'Smoke test passed — prediction: {data[\"predictions\"][0]:.4f}')
          " || (echo "Smoke test FAILED" && exit 1)